name: Unzip

on: push

jobs:
  unzip:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Unzip forgeos.zip
        run: |
          unzip -o forgeos.zip
          rm forgeos.zip
      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add .
          git commit -m "Unzip forgeos.zip" || echo "No changes"
          git push
